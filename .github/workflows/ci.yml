name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-fast:
    runs-on: ubuntu-latest
    env:
      ORION_API_RATE_LIMIT_POST: 10000/minute
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev,api]"

      - name: Verify (lint + fast tests)
        run: make verify

  test:
    runs-on: ubuntu-latest
    env:
      ORION_API_RATE_LIMIT_POST: 10000/minute
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev,api]"

      - name: Verify console script
        run: orion-copilot --version

      - name: Ruff lint
        run: ruff check app tests main.py scripts

      - name: Run tests
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config -q

      - name: Build API Docker image
        run: docker build -t orion-data-copilot:ci .

      - name: Smoke test (container /health, /ready)
        run: |
          set -eux
          docker run -d --name odc -p 8765:8000 orion-data-copilot:ci
          # Wait for the container to start accepting connections; if it exits, print logs.
          for i in $(seq 1 60); do
            if ! docker ps --format '{{.Names}}' | grep -qx odc; then
              echo "Container exited before becoming ready."
              docker ps -a
              docker logs odc || true
              exit 1
            fi
            if curl -sf http://127.0.0.1:8765/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8765/health
          curl -sf --retry 10 --retry-delay 1 --retry-connrefused http://127.0.0.1:8765/ready
          docker rm -f odc
