name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ORION_API_RATE_LIMIT_POST: 10000/minute
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev,api]"

      - name: Verify console script
        run: orion-copilot --version

      - name: Ruff lint
        run: ruff check app tests main.py scripts

      - name: Run tests
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config -q

      - name: Build API Docker image
        run: docker build -t orion-data-copilot:ci .

      - name: Smoke test (container /health)
        run: |
          set -eux
          docker run -d --name odc -p 8765:8000 orion-data-copilot:ci
          curl -sf --retry 30 --retry-delay 1 --retry-connrefused http://127.0.0.1:8765/health
          docker rm -f odc
