# Build and push the HTTP API image to GitHub Container Registry (ghcr.io).
# Tags: on git tag push v* → :<semver> and :latest; manual run → :<app/version.py> and :latest
name: Publish to GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set image name and version tag
        id: meta
        run: |
          set -eux
          IMAGE="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            V="${{ github.ref_name }}"
            V="${V#v}"
            echo "version=$V" >> "$GITHUB_OUTPUT"
          else
            V="$(python3 -c "import re, pathlib; t=pathlib.Path('app/version.py').read_text(); m=re.search(r'__version__\s*=\s*\"([^\"]+)\"', t); print(m.group(1) if m else '0.0.0')")"
            echo "version=$V" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
